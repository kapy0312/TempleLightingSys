<!doctype html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正坤佛院落成點燈管理系統</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gov-red: #c8161d;
            --gov-red-dark: #a01018;
            --gov-red-light: #e8343b;
            --gov-navy: #1a3a5c;
            --gov-navy-light: #2b5585;
            --gov-gold: #d4a843;
            --gov-gray: #f4f5f7;
            --gov-gray-mid: #e0e4e9;
            --gov-text: #2c2c2c;
            --gov-text-light: #5a6472;
            --gov-white: #ffffff;
            --gov-border: #dde1e7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--gov-gray);
            color: var(--gov-text);
        }

        .header-main {
            background: var(--gov-white);
            border-bottom: 3px solid var(--gov-red);
            padding: 14px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo .logo-text h1 {
            font-size: 22px;
            font-weight: 900;
            color: var(--gov-red);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .header-logo .logo-text p {
            font-size: 11px;
            color: var(--gov-text-light);
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gov-login {
            background: var(--gov-red);
            color: #fff;
            border: none;
            padding: 7px 18px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
            font-family: inherit;
        }

        .btn-gov-login:hover {
            background: var(--gov-red-dark);
        }

        .btn-gov-logout {
            background: #555;
            color: #fff;
            border: none;
            padding: 7px 18px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .main-content {
            padding: 28px 0 60px;
        }

        .search-panel {
            background: var(--gov-white);
            border: 1px solid var(--gov-border);
            border-top: 3px solid var(--gov-red);
            border-radius: 0 0 6px 6px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
        }

        .search-panel .panel-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--gov-red);
            letter-spacing: 1px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-panel .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gov-border);
        }

        .form-control-gov {
            border: 1px solid var(--gov-border);
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control-gov:focus {
            border-color: var(--gov-navy);
            box-shadow: 0 0 0 3px rgba(26, 58, 92, .1);
        }

        .btn-gov-primary {
            background: var(--gov-navy);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background .2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-gov-primary:hover {
            background: var(--gov-navy-light);
        }

        .btn-gov-secondary {
            background: var(--gov-white);
            color: var(--gov-navy);
            border: 1px solid var(--gov-navy);
            padding: 8px 20px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-gov-secondary:hover {
            background: var(--gov-navy);
            color: #fff;
        }

        .btn-gov-success {
            background: #1e7e5c;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-gov-warning {
            background: var(--gov-gold);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-gov-add {
            background: var(--gov-red);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .data-panel {
            background: var(--gov-white);
            border: 1px solid var(--gov-border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
        }

        .data-panel-header {
            background: var(--gov-navy);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .data-panel-header h3 {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-panel-header h3 .dot {
            width: 8px;
            height: 8px;
            background: var(--gov-gold);
            border-radius: 50%;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #f0f2f5;
            border-bottom: 2px solid var(--gov-red);
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--gov-navy);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        tbody td {
            padding: 10px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--gov-border);
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f7f9fc;
        }

        .names-cell div {
            border-bottom: 1px dashed #ddd;
            padding: 3px 0;
            font-size: 13px;
        }

        .names-cell div:last-child {
            border-bottom: none;
        }

        .badge-amount {
            background: #e8f5ee;
            color: #1a7a4a;
            border: 1px solid #b8dfc9;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-id {
            background: var(--gov-gray);
            color: var(--gov-text-light);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--gov-border);
        }

        .badge-lamp {
            background: #eef3fb;
            color: var(--gov-navy);
            border: 1px solid #c5d5ee;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-edit {
            background: var(--gov-navy-light);
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            margin-right: 4px;
        }

        .btn-delete {
            background: var(--gov-red);
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gov-text-light);
        }

        .empty-state i {
            font-size: 48px;
            opacity: .3;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 6px;
            width: 420px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
            overflow: hidden;
        }

        .modal-header-gov {
            background: var(--gov-navy);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header-gov h5 {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, .7);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-body-gov {
            padding: 24px 20px;
        }

        .modal-footer-gov {
            padding: 14px 20px;
            border-top: 1px solid var(--gov-border);
            text-align: right;
        }

        .form-group-gov {
            margin-bottom: 16px;
        }

        .form-group-gov label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--gov-text-light);
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-group-gov input {
            width: 100%;
            border: 1px solid var(--gov-border);
            border-radius: 3px;
            padding: 9px 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }

        .form-group-gov input:focus {
            border-color: var(--gov-navy);
        }

        .form-small {
            font-size: 11px;
            color: var(--gov-text-light);
            margin-top: 3px;
        }

        .footer-gov {
            background: var(--gov-navy);
            color: rgba(255, 255, 255, .6);
            text-align: center;
            padding: 18px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .footer-gov span {
            color: var(--gov-gold);
        }

        .d-none {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- 主標題列 -->
    <div class="header-main">
        <div
            style="max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;">
            <div class="header-logo" style="display:flex;align-items:center;">
                <div class="logo-icon" style="background:none;box-shadow:none;">
                    <img src="/static/intdex_logo.png" alt="logo"
                        style="width:80px;height:80px;object-fit:contain;border-radius:0;display:block;">
                </div>
                <div class="logo-text" style="margin-left:20px;position:relative;top:8px;">
                    <h1>正坤佛院落成點燈管理系統</h1>
                    <p>ZHENGKUN TEMPLE LIGHTING MANAGEMENT SYSTEM</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="btnLogin" class="btn-gov-login"
                    onclick="document.getElementById('loginModal').classList.add('show')">
                    <i class="bi bi-person-lock"></i> 管理員登入
                </button>
                <button id="btnLogout" class="btn-gov-logout d-none" onclick="doLogout()">
                    <i class="bi bi-box-arrow-right"></i> 登出
                </button>
            </div>
        </div>
    </div>

    <!-- 主內容 -->
    <div class="main-content">
        <div style="max-width:1200px;margin:0 auto;padding:0 20px;">

            <!-- 搜尋面板 -->
            <div class="search-panel">
                <div class="panel-title"><i class="bi bi-search"></i> 資料查詢</div>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input type="text" id="searchInput" class="form-control-gov" placeholder="輸入姓名、燈種或壇名進行搜尋..."
                        style="width:280px;" onkeydown="if(event.key==='Enter')doSearch()">
                    <button id="btnSearch" class="btn-gov-primary" onclick="doSearch()">
                        <i class="bi bi-search"></i> 查詢
                    </button>
                    <button id="btnShowAll" class="btn-gov-secondary admin-col d-none"
                        onclick="document.getElementById('searchInput').value='';loadRecords('',true)">
                        <i class="bi bi-list-ul"></i> 顯示全部
                    </button>
                    <button id="btnExport" class="btn-gov-success admin-col d-none" onclick="doExport()">
                        <i class="bi bi-file-earmark-spreadsheet"></i> 匯出 CSV
                    </button>
                    <button id="btnImport" class="btn-gov-warning admin-col d-none"
                        onclick="document.getElementById('importFile').click()">
                        <i class="bi bi-file-earmark-arrow-up"></i> 匯入
                    </button>
                    <input type="file" id="importFile"
                        accept=".csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                        class="d-none">
                </div>
            </div>

            <!-- 資料表格 -->
            <div class="data-panel">
                <div class="data-panel-header">
                    <h3><span class="dot"></span> 點燈清單</h3>
                    <button id="btnAdd" class="btn-gov-add admin-col d-none"
                        onclick="document.getElementById('recordModal').classList.add('show')">
                        <i class="bi bi-plus-lg"></i> 新增紀錄
                    </button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th width="7%">編號</th>
                            <th width="28%">姓名</th>
                            <th width="18%">燈種</th>
                            <th width="14%">金額</th>
                            <th width="18%">壇名</th>
                            <th width="15%" class="text-center admin-col d-none">操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordTableBody">
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="bi bi-search"></i>
                                    <p>請輸入關鍵字查詢，或點選「顯示全部」瀏覽清單</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- 頁尾 -->
    <div class="footer-gov">
        正坤佛院落成點燈管理系統 &nbsp;|&nbsp; <span>v1.0.6</span> &nbsp;|&nbsp; 版權所有 © 2026 正坤佛院
    </div>

    <!-- ── 登入 Modal ── -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <div class="modal-header-gov">
                <h5><i class="bi bi-person-lock"></i> 管理員登入</h5>
                <button class="modal-close"
                    onclick="document.getElementById('loginModal').classList.remove('show')">×</button>
            </div>
            <div class="modal-body-gov">
                <div class="form-group-gov">
                    <label>帳號</label>
                    <input type="text" id="username" value="admin" placeholder="請輸入帳號">
                </div>
                <div class="form-group-gov">
                    <label>密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼"
                        onkeydown="if(event.key==='Enter')doLogin()">
                </div>
            </div>
            <div class="modal-footer-gov">
                <button class="btn-gov-login" onclick="doLogin()"><i class="bi bi-box-arrow-in-right"></i> 登入</button>
            </div>
        </div>
    </div>

    <!-- ── 新增 Modal ── -->
    <div class="modal-overlay" id="recordModal">
        <div class="modal-box">
            <div class="modal-header-gov">
                <h5><i class="bi bi-plus-circle"></i> 新增點燈紀錄</h5>
                <button class="modal-close"
                    onclick="document.getElementById('recordModal').classList.remove('show')">×</button>
            </div>
            <div class="modal-body-gov">
                <div class="form-group-gov">
                    <label>姓名</label>
                    <input type="text" id="names" placeholder="例如：吳雅惠, 李毓卿">
                    <div class="form-small">多筆姓名請以空白或逗號分隔</div>
                </div>
                <div class="form-group-gov">
                    <label>燈種</label>
                    <input type="text" id="lampType" placeholder="例如：光明萬德、光明福慧">
                </div>
                <div class="form-group-gov">
                    <label>金額</label>
                    <input type="number" id="amount" placeholder="請輸入金額">
                </div>
                <div class="form-group-gov">
                    <label>壇名</label>
                    <input type="text" id="altarName" placeholder="請輸入壇名">
                </div>
            </div>
            <div class="modal-footer-gov">
                <button class="btn-gov-login" id="saveRecord"><i class="bi bi-check-lg"></i> 儲存</button>
            </div>
        </div>
    </div>

    <!-- ── 編輯 Modal ── -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-header-gov">
                <h5><i class="bi bi-pencil-square"></i> 編輯點燈紀錄</h5>
                <button class="modal-close"
                    onclick="document.getElementById('editModal').classList.remove('show')">×</button>
            </div>
            <div class="modal-body-gov">
                <input type="hidden" id="editId">
                <div class="form-group-gov">
                    <label>姓名</label>
                    <input type="text" id="editNames">
                </div>
                <div class="form-group-gov">
                    <label>燈種</label>
                    <input type="text" id="editLampType">
                </div>
                <div class="form-group-gov">
                    <label>金額</label>
                    <input type="number" id="editAmount">
                </div>
                <div class="form-group-gov">
                    <label>壇名</label>
                    <input type="text" id="editAltarName">
                </div>
            </div>
            <div class="modal-footer-gov">
                <button class="btn-gov-login" id="updateRecord"><i class="bi bi-check-lg"></i> 更新</button>
            </div>
        </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        let isAdmin = false;

        document.addEventListener("DOMContentLoaded", () => {
            checkAuthStatus();
        });

        async function checkAuthStatus() {
            const res = await fetch("/api/auth/status");
            const data = await res.json();
            isAdmin = data.logged_in;

            document.getElementById("btnLogin").classList.toggle("d-none", isAdmin);
            document.getElementById("btnLogout").classList.toggle("d-none", !isAdmin);

            document.querySelectorAll(".admin-col").forEach(el => {
                if (isAdmin) el.classList.remove("d-none");
                else el.classList.add("d-none");
            });

            loadRecords('', false);
        }

        async function doLogin() {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value,
                }),
            });
            if (res.ok) {
                document.getElementById("loginModal").classList.remove("show");
                checkAuthStatus();
            } else {
                alert("登入失敗，請確認帳號密碼");
            }
        }

        async function doLogout() {
            await fetch("/api/auth/logout", { method: "POST" });
            document.getElementById("password").value = "";
            checkAuthStatus();
        }

        async function loadRecords(query = "", forceAll = false) {
            let url = `/api/records?q=${encodeURIComponent(query)}`;
            if (forceAll) url += "&all=true";

            const res = await fetch(url);
            const records = await res.json();
            const tbody = document.getElementById("recordTableBody");

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p>${query ? '查無符合「' + query + '」的資料' : '請輸入關鍵字查詢，或點選「顯示全部」'}</p>
                </div></td></tr>`;
                return;
            }

            tbody.innerHTML = "";
            records.forEach(r => {
                const nameArray = r.names.split(/[,，\s]+/);
                const namesHtml = nameArray.filter(n => n.trim()).map(n => `<div>${n.trim()}</div>`).join('');
                const safeData = JSON.stringify(r).replace(/'/g, "&apos;");
                const adminTd = isAdmin
                    ? `<td class="text-center admin-col" style="white-space:nowrap;">
                        <button class="btn-edit" onclick='openEditModal(${safeData})'><i class="bi bi-pencil-square"></i> 編輯</button>
                        <button class="btn-delete" onclick="deleteRecord(${r.id})"><i class="bi bi-trash"></i> 刪除</button>
                      </td>`
                    : `<td class="admin-col d-none"></td>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge-id">${r.id}</span></td>
                    <td><div class="names-cell" id="names-${r.id}"></div></td>
                    <td><span class="badge-lamp">${r.lamp_type || '—'}</span></td>
                    <td><span class="badge-amount" ${!isAdmin ? 'style="filter:blur(4px);user-select:none;"' : ''}>$${r.amount.toLocaleString()}</span></td>
                    <td>${r.altar_name}</td>
                    ${adminTd}
                `;
                tbody.appendChild(tr);
                document.getElementById(`names-${r.id}`).innerHTML = namesHtml;
            });
        }

        function doSearch() {
            loadRecords(document.getElementById('searchInput').value, false);
        }

        window.openEditModal = (data) => {
            document.getElementById('editId').value = data.id;
            document.getElementById('editNames').value = data.names;
            document.getElementById('editLampType').value = data.lamp_type || '';
            document.getElementById('editAmount').value = data.amount;
            document.getElementById('editAltarName').value = data.altar_name;
            document.getElementById('editModal').classList.add('show');
        };

        document.getElementById('saveRecord').addEventListener('click', async () => {
            const payload = {
                names: document.getElementById("names").value,
                lamp_type: document.getElementById("lampType").value,
                amount: parseInt(document.getElementById("amount").value),
                altar_name: document.getElementById("altarName").value,
            };
            await fetch("/api/records", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            document.getElementById("recordModal").classList.remove("show");
            document.getElementById("names").value = "";
            document.getElementById("lampType").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("altarName").value = "";
            loadRecords('', true);
        });

        document.getElementById('updateRecord').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const payload = {
                names: document.getElementById('editNames').value,
                lamp_type: document.getElementById('editLampType').value,
                amount: parseInt(document.getElementById('editAmount').value),
                altar_name: document.getElementById('editAltarName').value
            };
            const res = await fetch(`/api/records/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                document.getElementById('editModal').classList.remove('show');
                const q = document.getElementById('searchInput').value;
                loadRecords(q, !q);
            }
        });

        window.deleteRecord = async (id) => {
            if (!confirm("確認刪除此筆紀錄？此操作無法復原。")) return;
            await fetch(`/api/records/${id}`, { method: "DELETE" });
            const q = document.getElementById('searchInput').value;
            loadRecords(q, q === '');
        };

        function doExport() {
            fetch('/api/records?all=true').then(r => r.json()).then(records => {
                if (!records.length) { alert('無資料可匯出'); return; }
                const headers = ['編號', '姓名', '燈種', '金額', '壇名'];
                const rows = records.map(r => [
                    r.id,
                    r.names.replace(/[\n\r,，\s]+/g, ' '),
                    r.lamp_type || '',
                    r.amount,
                    r.altar_name
                ]);
                const csv = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `點燈清單匯出_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            });
        }

        document.getElementById('importFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!confirm("確定要匯入此檔案？資料將新增至現有清單，不會刪除原有紀錄。")) { e.target.value = ''; return; }
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/api/records/import', { method: 'POST', body: formData });
                const result = await res.json();
                if (res.ok) { alert("✅ 資料匯入成功！"); loadRecords('', true); }
                else alert("❌ " + result.error);
            } catch { alert("❌ 傳輸過程發生錯誤"); }
            finally { e.target.value = ''; }
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => {
                if (e.target === overlay) overlay.classList.remove('show');
            });
        });
    </script>
</body>

</html>
